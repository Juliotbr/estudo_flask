<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bloco de Notas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Minhas Anotações</h1>
    
    <form action="/" method="POST">
        <input type="text" name="conteudo" placeholder="Digite sua anotação aqui..." required>
        <button type="submit">Salvar Nota</button>
    </form>

    <hr>

    <ul>
        {% for nota in notas %}
            <li>
                {{ nota.conteudo }} 
                <a href="/editar/{{ nota.id }}" style="color: blue; text-decoration: none; margin-left: 10px;">[ Editar ]</a>
                <a href="/deletar/{{ nota.id }}" style="color: red; text-decoration: none; margin-left: 10px;">[ Deletar ]</a>
            </li>
        {% else %}
            <li>Nenhuma anotação salva ainda.</li>
        {% endfor %}
    </ul>
</body>
</html>
